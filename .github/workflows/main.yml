name: Changeonly Deploy to Salesforce

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli
          sf --version
      
      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SALESFORCE_AUTH_URL }}" > authfile.txt
          sf org login sfdx-url --sfdx-url-file authfile.txt --alias deployment-org --set-default
      
      - name: Deploy changed metadata only
        run: |
          PREV="${{ github.event.before }}"
          CURR="${{ github.sha }}"
      
          echo "Previous commit: $PREV"
          echo "Current commit:  $CURR"
          
          git fetch --all --prune
          
          if git cat-file -e "$PREV"^{commit}; then
            echo "Previous commit exists. Using git diff."
            CHANGED_FILES=$(git diff --name-only "$PREV" "$CURR" | grep '^force-app/' || true)
          else
            echo "Previous commit not found. Falling back to last commit."
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep '^force-app/' || true)
          fi
      
          echo "Changed files (from git diff):"
          echo "$CHANGED_FILES"

          # Filter out deleted files - only keep files that exist on disk
          EXISTING_FILES=""
          for f in $CHANGED_FILES; do
            if [ -f "$f" ]; then
              EXISTING_FILES="$EXISTING_FILES $f"
            else
              echo "Skipping deleted file: $f"
            fi
          done
          EXISTING_FILES=$(echo "$EXISTING_FILES" | xargs)

          # For dashboards and reports, include parent folder meta file
          EXTRA_FILES=""
          for f in $EXISTING_FILES; do
            PARENT_DIR=$(dirname "$f")
            FOLDER_META="${PARENT_DIR}-meta.xml"
            if [ -f "$FOLDER_META" ]; then
              case "$EXTRA_FILES" in
                *"$FOLDER_META"*) ;;  # already added
                *) EXTRA_FILES="$EXTRA_FILES $FOLDER_META" ;;
              esac
            fi
          done
          EXISTING_FILES="$EXISTING_FILES $EXTRA_FILES"
          EXISTING_FILES=$(echo "$EXISTING_FILES" | xargs)

          echo "Files to deploy:"
          echo "$EXISTING_FILES"

          if [ -z "$EXISTING_FILES" ]; then
            echo "No Salesforce metadata changes found. Skipping deploy."
          else
            sf project deploy start \
              --source-dir $EXISTING_FILES \
              --target-org deployment-org \
              --wait 30
          fi
