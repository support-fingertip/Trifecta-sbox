name: Deploy Post-Sales Reports & Dashboards

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli
          sf --version

      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SALESFORCE_AUTH_URL }}" > authfile.txt
          sf org login sfdx-url --sfdx-url-file authfile.txt --alias deployment-org --set-default
          rm -f authfile.txt

      - name: Deploy Post-Sales Reports & Dashboards
        run: |
          echo "Deploying Post-Sales Reports and Dashboards..."

          sf project deploy start \
            --source-dir force-app/main/default/reports/Post_Sales_Reports \
            --source-dir force-app/main/default/reports/Post_Sales_Dashboard_Reports \
            --source-dir force-app/main/default/dashboards/Post_Sales_Dashboards \
            --target-org deployment-org \
            --wait 30

          echo "Deployment completed successfully!"
