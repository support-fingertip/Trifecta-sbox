<template>
    <template if:true={loading}>
        <section role="dialog" tabindex="-1" aria-modal="true"
                 class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container">
                <div class="slds-modal__content slds-p-around_medium slds-is-relative"
                     style="min-height: 8rem;">
                    <lightning-spinner alternative-text="Loading"></lightning-spinner>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:false={loading}>
        <section role="dialog" tabindex="-1" aria-modal="true"
                 aria-labelledby="ps-edit-heading"
                 class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">

                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close"
                            onclick={handleCancel}>
                        <lightning-icon icon-name="utility:close"
                                        alternative-text="Close"
                                        variant="inverse"
                                        size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 id="ps-edit-heading" class="slds-modal__title slds-hyphenate">
                        Edit Payment Percentages
                    </h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium ps-modal-body">
                    <p class="slds-text-body_small slds-m-bottom_x-small">
                        <strong>Booking Total:</strong>
                        <lightning-formatted-number value={bookingTotal}
                            format-style="currency" currency-code="INR">
                        </lightning-formatted-number>
                        &nbsp;&middot;&nbsp;
                        <strong>Project Type:</strong> {projectType}
                        &nbsp;&middot;&nbsp;
                        <strong>Target Total %:</strong> {expectedTotal}%
                    </p>

                    <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col">Name</th>
                                <th scope="col" class="slds-text-align_right">Payment %</th>
                                <th scope="col" class="slds-text-align_right">Amount</th>
                                <th scope="col">Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={rows} for:item="row">
                                <tr key={row.id} class={row.rowClass}>
                                    <td data-label="Name">{row.name}</td>
                                    <td data-label="Payment %" class="slds-text-align_right">
                                        <lightning-input
                                            type="number"
                                            step="0.01"
                                            variant="label-hidden"
                                            data-id={row.id}
                                            value={row.pct}
                                            disabled={row.disabled}
                                            onchange={handlePctChange}
                                            class="ps-pct-input">
                                        </lightning-input>
                                        <template if:true={row.errorMsg}>
                                            <div class="slds-text-color_error slds-text-body_small slds-m-top_xx-small">
                                                {row.errorMsg}
                                            </div>
                                        </template>
                                    </td>
                                    <td data-label="Amount" class="slds-text-align_right">
                                        <lightning-formatted-number value={row.amount}
                                            format-style="currency" currency-code="INR">
                                        </lightning-formatted-number>
                                    </td>
                                    <td data-label="Status">
                                        <lightning-badge label={row.statusLabel}
                                            class={row.statusClass}>
                                        </lightning-badge>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                        <tfoot>
                            <tr class="ps-total-row">
                                <th scope="row"><strong>Total</strong></th>
                                <th scope="row" class={totalPctClass}>
                                    <strong>{totalPct}%</strong>
                                </th>
                                <th scope="row" class="slds-text-align_right">
                                    <strong>
                                        <lightning-formatted-number value={totalAmount}
                                            format-style="currency" currency-code="INR">
                                        </lightning-formatted-number>
                                    </strong>
                                </th>
                                <th scope="row"></th>
                            </tr>
                        </tfoot>
                    </table>

                    <template if:false={isTotalValid}>
                        <p class="slds-text-color_error slds-m-top_small">
                            Total must equal {expectedTotal}% (currently {totalPct}%).
                        </p>
                    </template>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button
                        label="Cancel"
                        onclick={handleCancel}
                        class="slds-m-right_x-small">
                    </lightning-button>
                    <lightning-button
                        variant="brand"
                        label="Save"
                        disabled={saveDisabled}
                        onclick={handleSave}>
                    </lightning-button>
                </footer>

            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
