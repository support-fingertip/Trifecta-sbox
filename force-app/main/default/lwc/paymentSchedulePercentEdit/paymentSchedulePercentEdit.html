<template>
    <lightning-card title="Edit Payment Percentages" icon-name="standard:currency">

        <template if:true={loading}>
            <div class="slds-p-around_medium slds-align_absolute-center">
                <lightning-spinner alternative-text="Loading"></lightning-spinner>
            </div>
        </template>

        <template if:false={loading}>
            <div class="slds-p-horizontal_medium slds-p-bottom_small">
                <p class="slds-text-body_small slds-m-bottom_x-small">
                    <strong>Booking Total:</strong>
                    <lightning-formatted-number value={bookingTotal} format-style="currency" currency-code="INR">
                    </lightning-formatted-number>
                    &nbsp;&middot;&nbsp;
                    <strong>Project Type:</strong> {projectType}
                    &nbsp;&middot;&nbsp;
                    <strong>Target Total %:</strong> {expectedTotal}%
                </p>

                <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                    <thead>
                        <tr class="slds-line-height_reset">
                            <th scope="col">Name</th>
                            <th scope="col" class="slds-text-align_right">Payment %</th>
                            <th scope="col" class="slds-text-align_right">Amount</th>
                            <th scope="col">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={rows} for:item="row">
                            <tr key={row.id} class={row.rowClass}>
                                <td data-label="Name">{row.name}</td>
                                <td data-label="Payment %" class="slds-text-align_right">
                                    <lightning-input
                                        type="number"
                                        step="0.01"
                                        variant="label-hidden"
                                        data-id={row.id}
                                        value={row.pct}
                                        disabled={row.disabled}
                                        onchange={handlePctChange}
                                        class="ps-pct-input">
                                    </lightning-input>
                                    <template if:true={row.errorMsg}>
                                        <div class="slds-text-color_error slds-text-body_small slds-m-top_xx-small">
                                            {row.errorMsg}
                                        </div>
                                    </template>
                                </td>
                                <td data-label="Amount" class="slds-text-align_right">
                                    <lightning-formatted-number value={row.amount} format-style="currency" currency-code="INR">
                                    </lightning-formatted-number>
                                </td>
                                <td data-label="Status">
                                    <lightning-badge label={row.statusLabel} class={row.statusClass}>
                                    </lightning-badge>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                    <tfoot>
                        <tr class="ps-total-row">
                            <th scope="row"><strong>Total</strong></th>
                            <th scope="row" class={totalPctClass}><strong>{totalPct}%</strong></th>
                            <th scope="row" class="slds-text-align_right">
                                <strong>
                                    <lightning-formatted-number value={totalAmount} format-style="currency" currency-code="INR">
                                    </lightning-formatted-number>
                                </strong>
                            </th>
                            <th scope="row"></th>
                        </tr>
                    </tfoot>
                </table>

                <template if:false={isTotalValid}>
                    <p class="slds-text-color_error slds-m-top_small">
                        Total must equal {expectedTotal}% (currently {totalPct}%).
                    </p>
                </template>
            </div>

            <div slot="footer" class="slds-text-align_right">
                <lightning-button
                    label="Cancel"
                    onclick={handleCancel}
                    class="slds-m-right_x-small">
                </lightning-button>
                <lightning-button
                    variant="brand"
                    label="Save"
                    disabled={saveDisabled}
                    onclick={handleSave}>
                </lightning-button>
            </div>
        </template>

    </lightning-card>
</template>
